name: seoulmate

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-seoulmate}
      POSTGRES_USER: ${POSTGRES_USER:-seoulmate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    stop_grace_period: 30s

  redis:
    image: redis:7.4-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-change-me}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    stop_grace_period: 30s

  app:
    build:
      context: .
      target: production
    environment:
      NODE_ENV: production
      PORT: 8080
      APP_VERSION: ${APP_VERSION:-local}
      DATABASE_URL: postgresql://${POSTGRES_USER:-seoulmate}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-seoulmate}
      DATABASE_SSL: "false"
      DATABASE_POOL_MIN: ${DATABASE_POOL_MIN:-2}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-20}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me}@redis:6379
      REDIS_REQUIRED: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      TRUST_PROXY: ${TRUST_PROXY:-false}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s

volumes:
  postgres_data:
  redis_data:
